env:
  # The output directory
  output: dist/

# The release configuration
release:
  # The release name
  name: release
  # The release targets
  targets:
    - name: linux
      package:
        # The package type
        type: rpm
        # The package configuration
        options:
          # The application name
          app_name: flutter_salat
          # The application version
          version: 1.0.0
          # The application description
          description: "A Flutter Prayer Schedule Application"
          # The application maintainer
          maintainer: "Dedoy <dedoy@example.com>"
          # The application dependencies
          # We include the tray manager dependencies here
          depends:
            - libayatana-appindicator-gtk3
            - gtk3
          # The desktop entry configuration
          desktop:
            name: "Flutter Salat"
            generic_name: "Prayer Schedule"
            comment: "Prayer Schedule Application"
            icon: "assets/app_icon.png"
            categories:
              - Utility

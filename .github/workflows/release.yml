name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libayatana-indicator3-dev libayatana-ido3-0.4-dev ninja-build
          
      - name: Build Linux
        run: flutter build linux --release
        
      - name: Package Release
        run: |
          # Copy install script and icon
          cp install_desktop_entry.sh build/linux/x64/release/bundle/install.sh
          cp assets/app_icon.png build/linux/x64/release/bundle/app_icon.png
          
          # Bulk bundle libraries
          mkdir -p build/linux/x64/release/bundle/lib
          cp /usr/lib/x86_64-linux-gnu/libayatana* build/linux/x64/release/bundle/lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libdbusmenu* build/linux/x64/release/bundle/lib/ || true
          
          # Create wrapper script for LD_LIBRARY_PATH
          printf '#!/bin/bash\nSCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"\nexport LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"\nexec "$SCRIPT_DIR/flutter_salat" "$@"\n' > build/linux/x64/release/bundle/run_app.sh
          chmod +x build/linux/x64/release/bundle/run_app.sh
          
          cd build/linux/x64/release/bundle
          tar -czvf $GITHUB_WORKSPACE/flutter_salat_linux.tar.gz .
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_salat_linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

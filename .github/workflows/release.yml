name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libayatana-indicator3-dev libayatana-ido3-0.4-dev ninja-build
          
      - name: Build Linux
        run: flutter build linux --release
        
      - name: Package Linux Release
        run: |
          # Copy install script and icon
          cp install_desktop_entry.sh build/linux/x64/release/bundle/install.sh
          cp uninstall_desktop_entry.sh build/linux/x64/release/bundle/uninstall.sh
          cp assets/app_icon.png build/linux/x64/release/bundle/app_icon.png
          
          # Bulk bundle libraries
          mkdir -p build/linux/x64/release/bundle/lib
          cp /usr/lib/x86_64-linux-gnu/libayatana* build/linux/x64/release/bundle/lib/ || true
          cp /usr/lib/x86_64-linux-gnu/libdbusmenu* build/linux/x64/release/bundle/lib/ || true
          
          # Create wrapper script for LD_LIBRARY_PATH
          printf '#!/bin/bash\nSCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"\nexport LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"\nexec "$SCRIPT_DIR/jadwal_salat" "$@"\n' > build/linux/x64/release/bundle/run_app.sh
          chmod +x build/linux/x64/release/bundle/run_app.sh
          
          cd build/linux/x64/release/bundle
          tar -czvf $GITHUB_WORKSPACE/flutter_salat_linux.tar.gz .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: flutter_salat_linux.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk flutter_salat_android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: flutter_salat_android.apk

  release:
    needs: [build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_salat_linux.tar.gz
            flutter_salat_android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
